services:
  nginx:
    image: nginx:stable-alpine
    container_name: docker-garage-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docker-garage-app
    # No ports exposed to host — nginx handles all external traffic
    expose:
      - "3000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/docker-garage:/tmp/docker-garage
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=production
      - PORT=3000
      - CORS_ORIGIN=${CORS_ORIGIN}
      - AUTH_USER=${AUTH_USER:-admin}
      - AUTH_PASS=${AUTH_PASS}
    restart: unless-stopped

volumes:
  node_modules:
